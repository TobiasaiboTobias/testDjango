{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"rel="stylesheet"integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqylQ2vZ6jIW3"crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/stijl.css' %}">
    <title></title>
</head>

<body>

    {% block content %}
    <header> <h1> Mijn website </h1> </header>
        <div id="blog_container">
        {% for post in posts %}

            <article class="post">
                <time class="date">
                    {{ post.published_date }}
                </time>

                <h2>
                    <a href="">
                        {{ post.title }}
                    </a>
                </h2>

                <p>
                    {{ post.text|linebreaksbr }}
                </p>
            </article>

        {% endfor %}
        </div>
    <footer></footer>
    {% endblock %}

</body>
</html>
